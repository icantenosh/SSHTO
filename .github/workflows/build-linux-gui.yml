name: Build Linux GUI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to upload the Linux GUI asset to"
        required: true

permissions:
  contents: write

jobs:
  build-linux-gui:
    if: github.event_name == 'workflow_dispatch' || contains(github.event.release.tag_name, 'gui')
    runs-on: ubuntu-latest

    steps:
      - name: Resolve release tag
        id: release
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out release source
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk
          python -m pip install --upgrade pip
          python -m pip install pyinstaller paramiko

      - name: Build standalone Linux GUI
        run: |
          pyinstaller --onefile --windowed --name sshto-gui-linux-x86_64 sshto-gui
          chmod +x dist/sshto-gui-linux-x86_64
          sha256sum dist/sshto-gui-linux-x86_64 > dist/sshto-gui-linux-x86_64.sha256

      - name: Build Debian package
        env:
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          VERSION="${TAG#v}"
          VERSION="${VERSION%-gui}"
          PACKAGE_ROOT="dist/deb/sshto-gui_${VERSION}_amd64"
          mkdir -p "$PACKAGE_ROOT/DEBIAN" "$PACKAGE_ROOT/usr/bin"
          cp dist/sshto-gui-linux-x86_64 "$PACKAGE_ROOT/usr/bin/sshto-gui"
          cp sshto "$PACKAGE_ROOT/usr/bin/sshto"
          chmod 755 "$PACKAGE_ROOT/usr/bin/sshto-gui" "$PACKAGE_ROOT/usr/bin/sshto"
          cat > "$PACKAGE_ROOT/DEBIAN/control" <<EOF
          Package: sshto-gui
          Version: $VERSION
          Section: net
          Priority: optional
          Architecture: amd64
          Depends: openssh-client, xterm | x-terminal-emulator
          Maintainer: icantenosh
          Description: SSHTO graphical SSH launcher
           Quick SSH launcher GUI with saved server management and internal key setup.
          EOF
          sed -i 's/^          //' "$PACKAGE_ROOT/DEBIAN/control"
          dpkg-deb --build "$PACKAGE_ROOT" "dist/sshto-gui_${VERSION}_amd64.deb"
          sha256sum "dist/sshto-gui_${VERSION}_amd64.deb" > "dist/sshto-gui_${VERSION}_amd64.deb.sha256"

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          gh release upload "$TAG" \
            dist/sshto-gui-linux-x86_64 \
            dist/sshto-gui-linux-x86_64.sha256 \
            dist/sshto-gui_*_amd64.deb \
            dist/sshto-gui_*_amd64.deb.sha256 \
            --clobber
